name: Send email via SendGrid SMTP (simple test)

on:
  push:
    branches:
      - main

jobs:
  email:
    runs-on: ubuntu-latest

    steps:
      - name: Install SMTP client
        run: sudo apt-get update && sudo apt-get install -y swaks

      - name: Send test email
        run: |
          swaks \
            --to deepthiramesh.chandra@ibm.com \
            --from deepthiramesh.chandra@ibm.com \
            --server smtp.sendgrid.net \
            --port 587 \
            --auth LOGIN \
            --auth-user apikey \
            --auth-password "$SENDGRID_API_KEY" \
            --tls \
            --header "Subject: GitHub Actions SMTP test" \
            --body "This email was sent from GitHub Actions using SendGrid SMTP."
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
