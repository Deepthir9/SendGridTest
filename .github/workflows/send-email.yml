name: Send email via EN SMTP (simple test)

on:
  push:
    branches:
      - main

jobs:
  email:
    runs-on: ubuntu-latest

    steps:
      - name: Install SMTP client
        run: sudo apt-get update && sudo apt-get install -y swaks

      - name: Send test email
        run: |
          swaks \
            --to deepthiramesh.chandra@ibm.com \
            --from test@producttest.in \
            --server smtp.us-south.event-notifications.cloud.ibm.com \
            --port 587 \
            --auth LOGIN \
            --auth-user 12x392w1v3711pj71605 \
            --auth-password 25gltu2A06Y4G8Wq0Uw8BAeKivB2r2 \
            --tls \
            --header "Subject: GitHub Actions SMTP test" \
            --body "This email was sent from GitHub Actions using En SMTP."
