name: EN test notification

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Publish event to IBM Event Notifications
        run: |
          curl -X POST \
          "https://$IBM_REGION.event-notifications.cloud.ibm.com/v1/instances/$IBM_EVENT_NOTIFICATIONS_INSTANCE_ID/topics/$IBM_EVENT_NOTIFICATIONS_TOPIC_ID/publish" \
          -H "Authorization: Bearer $IBM_API_KEY" \
          -H "Content-Type: application/json" \
          -d '{
            "subject": "GitHub → IBM EN test",
            "message": "This event was published from GitHub Actions to IBM Event Notifications.",
            "severity": "info"
          }'
        env:
          IBM_API_KEY: ${{ secrets.IBM_API_KEY }}
          IBM_EVENT_NOTIFICATIONS_INSTANCE_ID: ${{ secrets.IBM_EVENT_NOTIFICATIONS_INSTANCE_ID }}
          IBM_EVENT_NOTIFICATIONS_TOPIC_ID: ${{ secrets.IBM_EVENT_NOTIFICATIONS_TOPIC_ID }}
          IBM_REGION: ${{ secrets.IBM_REGION }}
